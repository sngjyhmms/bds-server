<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모엔월드</title>
    <script>
        const serverName = "모엔월드";
        const serverHost = "61.254.205.186";
        const serverPort = "19132";
        const serverIp = serverHost + ":" + serverPort;
        
        // 1. 등록용 링크
        const safeParam = encodeURIComponent(serverName + "|" + serverIp);
        const addLink = "minecraft://?addExternalServer=" + safeParam;

        // 2. 바로 접속 링크
        const connectLink = "minecraft://connect/?serverUrl=" + serverHost + "&serverPort=" + serverPort;

        window.onload = function() {
            // 각 버튼에 링크 연결
            document.getElementById('btn-connect').href = connectLink;
            document.getElementById('btn-add').href = addLink;
            
            // 💡 10초 카운트다운 후 '자동 접속' 실행
            let timeLeft = 10;
            const timerText = document.getElementById('timer-text');
            
            const timer = setInterval(function() {
                timeLeft--;
                if (timeLeft > 0) {
                    timerText.innerText = timeLeft + "초 후 모엔월드에 자동 접속됩니다.";
                } else {
                    clearInterval(timer);
                    timerText.innerText = "마인크래프트를 실행하여 월드에 접속하는 중입니다...";
                    // 자동 이동은 접속(connectLink)으로 처리
                    window.location.href = connectLink; 
                }
            }, 1000); // 1초마다 갱신 (총 10초)
        };

        function copyIp() {
            navigator.clipboard.writeText(serverIp).then(() => {
                alert("서버 주소(" + serverIp + ")가 복사되었습니다!\n마인크래프트 서버 탭에서 직접 추가해 보세요.포트:19132");
            }).catch(() => {
                alert("복사에 실패했습니다. 직접 입력해 주세요: " + serverIp);
            });
        }
    </script>
    <style>
        body { text-align: center; font-family: sans-serif; padding-top: 100px; background-color: #1e1e1e; color: #ffffff; }
        .btn { display: inline-block; padding: 15px 30px; text-decoration: none; font-weight: bold; border-radius: 5px; margin: 10px; font-size: 16px; }
        .btn-blue { background-color: #2196F3; color: white; }
        .btn-green { background-color: #5c8a34; color: white; }
        .btn-gray { background-color: #444; color: white; border: 1px solid #666; cursor: pointer; font-size: 14px; padding: 12px 24px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>모엔 월드 </h2>
    
    <p id="timer-text" style="font-size: 18px; font-weight: bold; color: #ffeb3b;">10초 후 서버에 자동 접속됩니다.</p>
    <p style="margin-bottom: 30px; color: #aaaaaa;">아래 버튼중 하나를 선택하세요.</p>
    
    <div>
        <a id="btn-connect" href="#" class="btn btn-blue"> 즉시 접속하기</a>
        <a id="btn-add" href="#" class="btn btn-green"> 서버 목록에 등록하기</a>
    </div>
    
    <div style="margin-top: 40px;">
        <button onclick="copyIp()" class="btn-gray"> 서버 주소 복사하기</button>
    </div>
</body>
</html>
